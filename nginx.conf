server {
    listen 0.0.0.0:80;
    listen [::]:80;
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # Compresión gzip
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # -------------------------------------------------------
    # Proxy inverso hacia el backend Flask
    # BACKEND_URL se inyecta en runtime via envsubst
    # Ejemplo: BACKEND_URL=http://rrhh-backend:5000
    # -------------------------------------------------------
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # -------------------------------------------------------
    # Assets estáticos hasheados — caché 1 año (inmutable)
    # -------------------------------------------------------
    location ~* \.(js|css|woff|woff2|ttf|eot|otf|ico|webp|png|jpg|jpeg|gif|svg|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # -------------------------------------------------------
    # Health check para Coolify / Docker
    # -------------------------------------------------------
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------
    # index.html — nunca cachear agresivamente
    # -------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # -------------------------------------------------------
    # SPA fallback — React Router maneja el routing en el cliente
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # Seguridad básica
    # -------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
